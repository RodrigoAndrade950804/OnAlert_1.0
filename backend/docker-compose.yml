version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: onalert-postgres
    environment:
      POSTGRES_USER: onalert_admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: onalert_auth
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - onalert-network

  mongodb:
    image: mongo:6.0
    container_name: onalert-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - onalert-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: onalert-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: onalert_guest
      RABBITMQ_DEFAULT_PASS: guest_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - onalert-network

volumes:
  postgres_data:
  mongodb_data:
  rabbitmq_data:

networks:
  onalert-network:
    driver: bridge
